services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ai_sprints
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ai_sprints"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.node
    restart: unless-stopped
    command: npm run dev:api
    env_file:
      - ../../.env
      - ../../apps/api/.env
    environment:
      NODE_ENV: development
      PORT: 4000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ai_sprints
      REDIS_URL: redis://redis:6379
      UPLOADS_DIR: /app/uploads
    ports:
      - "4100:4000"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:4000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 20s
      timeout: 10s
      retries: 10

  admin-web:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.node
    restart: unless-stopped
    command: npm run dev:admin
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:4100
    ports:
      - "3001:3001"
    depends_on:
      api:
        condition: service_healthy

  operator-web:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.node
    restart: unless-stopped
    command: npm run dev:operator
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:4100
    ports:
      - "3002:3002"
    depends_on:
      api:
        condition: service_healthy

  investor-web:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.node
    restart: unless-stopped
    command: npm run dev:investor
    environment:
      NODE_ENV: development
      PORT: 3000
      NEXT_PUBLIC_API_URL: http://localhost:4100
      ADMIN_WEB_URL: http://admin-web:3001
      OPERATOR_WEB_URL: http://operator-web:3002
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
      admin-web:
        condition: service_started
      operator-web:
        condition: service_started

volumes:
  postgres_data:
  redis_data:
  uploads_data:
